apiVersion: apps/v1
kind: Deployment
metadata:
  name: neurolex-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neurolex-backend
  template:
    metadata:
      labels:
        app: neurolex-backend
    spec:
      containers:
        - name: neurolex-backend
          image: neurolex-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: FIREBASE_CREDENTIALS
              value: "REPLACE_WITH_FIREBASE_CREDENTIALS"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: neurolex-backend
spec:
  type: ClusterIP
  selector:
    app: neurolex-backend
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001